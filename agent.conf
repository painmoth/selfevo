# Agent 配置文件
# 格式: KEY="VALUE" 或 KEY='VALUE' 或 KEY=VALUE

# ========== LLM 配置 ==========
# LLM提供商: openai, openrouter 等
# 默认: openai
#LLM_PROVIDER="openai"

# LLM API密钥（优先使用此配置）
# 如果未设置，会尝试读取 OPENAI_API_KEY（向后兼容）
#LLM_API_KEY=""

# 向后兼容：OpenAI API Key（如果LLM_API_KEY未设置，会使用此配置）
# OPENAI_API_KEY=""

# LLM模型名称
# OpenAI示例: gpt-4o, gpt-4-turbo, gpt-3.5-turbo
# OpenRouter示例: openai/gpt-4o, anthropic/claude-3-opus, meta-llama/llama-3-70b-instruct
#LLM_MODEL="gpt-4o"

# LLM API基础URL（可选）
# OpenRouter会自动使用 https://openrouter.ai/api/v1
# 其他自定义API可以设置此值，例如: https://api.example.com/v1
# LLM_BASE_URL=""

# ========== 使用 OpenRouter 示例 ==========
# 要切换到 OpenRouter，修改以下配置：
LLM_PROVIDER="openrouter"
LLM_API_KEY=""
LLM_MODEL="google/gemini-3-flash-preview"
# 或其他模型，如 "anthropic/claude-3-opus"
# OpenRouter会自动使用正确的base_url，无需手动设置LLM_BASE_URL

# ========== 其他配置 ==========
# MAX_TOKENS=2000

# 调试日志级别 (0-3)
# 0: 不打印任何调试信息（默认）
# 1: 只打印基本信息（系统消息是否包含历史记忆）
# 2: 打印完整消息列表（截断长内容，最多1000字符）
# 3: 打印完整消息列表（不截断，完整显示）
DEBUG_LOG_LEVEL=1
